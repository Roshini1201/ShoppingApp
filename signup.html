<!DOCTYPE html>
<html>
    <head>
        <title>Signup</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h2>Welcome</h2>
            <p>Please sign up to continue to the website</p>
            <div class="login">
                <form action="home.html">
                    <p class="credentials"><strong>Username:</strong></p>
                    <input type="text" placeholder="Enter username" required>
                    <p class="credentials"><strong>Email:</strong></p>
                    <input type="email" placeholder="Enter email id" required>
                    <p class="credentials"><strong>Password:</strong></p>
                    <input type="password" placeholder="Enter password" required>
                    <br><br>
                    <button type="submit" class="sub">Sign up</button>
                </form>
            </div>
            <p>Already have an account?</p>
            <p>Click here to login</p>
            <a href="login.html">Login</a>
        </div>
    </body>
</html>
